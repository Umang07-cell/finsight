services:
  - type: web
    name: finsight-api
    rootDir: .
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ALPHA_VANTAGE_KEY
        sync: false
      - key: CHROMA_PATH
        value: /var/data/chroma_db
    healthCheckPath: /health
    disk:
      name: chroma-disk
      mountPath: /var/data/chroma_db
      sizeGB: 1